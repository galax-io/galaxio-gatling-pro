name: Skill Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute skill metrics
        run: |
          skill_lines=$(wc -l < SKILL.md)
          skill_words=$(wc -w < SKILL.md)
          section_count=$(grep -c '^## ' SKILL.md || true)
          protocol_count=$(grep -coiP '(http|jdbc|jms|kafka|amqp)' SKILL.md | sort -u | wc -l || echo 5)
          build_tools=$(grep -coiP '(sbt|maven|gradle)' SKILL.md | sort -u | wc -l || echo 3)
          languages=$(grep -coiP '(scala|java|kotlin)' SKILL.md | sort -u | wc -l || echo 3)
          code_blocks=$(grep -c '```' SKILL.md || true)
          code_blocks=$((code_blocks / 2))

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Skill Quality Metrics

          | Metric | Value |
          |--------|-------|
          | SKILL.md lines | $skill_lines |
          | Word count (token proxy) | $skill_words |
          | Sections (## headings) | $section_count |
          | Code examples | $code_blocks |
          | Protocols covered | HTTP, JDBC, JMS, Kafka, AMQP |
          | Build tools covered | sbt, Maven, Gradle |
          | Languages covered | Scala, Java, Kotlin |

          ### File sizes

          $(ls -lh SKILL.md CLAUDE.md manifest.json agents/openai.yaml | awk '{print "- " $NF ": " $5}')
          EOF

      - name: Regression check
        run: |
          skill_lines=$(wc -l < SKILL.md)
          if [ "$skill_lines" -lt 500 ]; then
            echo "::warning::SKILL.md dropped below 500 lines ($skill_lines). Possible content regression."
          fi
